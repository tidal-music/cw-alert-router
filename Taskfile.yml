version: '3'

tasks:
  test:
    desc: Run unit and integration tests
    cmds:
      - go test -v ./...

  build:
    desc: Build the lambda deployment package (function.zip) via docker
    cmds:
      - docker build --target build -t cw-alert-router:build .

  publish:
    desc: Copy function.zip out of the build image into the working directory
    deps: [build]
    cmds:
      - docker run -v "{{.PWD}}:/target" --rm cw-alert-router:build cp /app/function.zip /target

  build-local:
    desc: Build the lambda bootstrap binary + function.zip without docker
    cmds:
      - CGO_ENABLED=0 GOOS=linux GOARCH=arm64 go build -tags lambda.norpc -o bootstrap .
      - zip function.zip bootstrap

  cov:
    desc: Run tests with coverage
    cmds:
      - go test -v -coverprofile=coverage.out -covermode=atomic -coverpkg=./... ./...

  clean:
    cmds:
      - rm -f bootstrap function.zip coverage.out
      - docker rmi -f cw-alert-router:build
